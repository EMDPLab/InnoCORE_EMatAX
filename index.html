<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DGIST InnoCORE E-MatAX 사업단</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260707-news-link-fix" />
  </head>
  <body>
    <a class="skip-link" href="#main">본문으로 바로가기</a>

    <header class="site-header" data-elevated="false">
      <a class="brand" href="#top" aria-label="DGIST InnoCORE E-MatAX home">
        <img src="./assets/ematax-logo.png" alt="" />
        <span>
          <strong>DGIST InnoCORE</strong>
          <em>E-MatAX Research Center</em>
        </span>
      </a>
      <nav class="site-nav" aria-label="주요 메뉴"></nav>
      <div class="header-actions">
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="ko" aria-pressed="true">KR</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>
        <a class="header-cta" href="https://www.innocore.or.kr/dgist/notice/sub01" data-field="headerCta">펠로우 채용 공고</a>
      </div>
    </header>

    <main id="main">
      <section class="hero" id="top" aria-labelledby="hero-title">
        <div class="hero-backdrop" aria-hidden="true"></div>
        <div class="hero-inner">
          <p class="eyebrow" data-field="heroEyebrow"></p>
          <h1 id="hero-title" data-field="heroTitle"></h1>
          <p class="hero-lede" data-field="heroLead"></p>
          <div class="hero-actions">
            <a class="primary-action" href="https://www.innocore.or.kr/dgist/notice/sub01" data-field="heroPrimary"></a>
            <a class="secondary-action" href="#research" data-field="heroSecondary"></a>
          </div>
        </div>
      </section>

      <section class="quick-facts" aria-label="핵심 정보"></section>

      <section class="content-band action-band" id="how-apply" aria-labelledby="how-apply-title">
        <div class="section-heading compact">
          <p data-field="howApplyKicker"></p>
          <h2 id="how-apply-title" data-field="howApplyTitle"></h2>
          <span data-field="howApplyLead"></span>
        </div>
        <div class="how-layout">
          <div class="how-steps"></div>
          <aside class="requirements-panel">
            <h3 data-field="requirementsTitle"></h3>
            <ul class="requirements-list"></ul>
          </aside>
        </div>
      </section>

      <section class="content-band intro-band" id="about" aria-labelledby="about-title">
        <div class="section-heading">
          <p data-field="aboutKicker"></p>
          <h2 id="about-title" data-field="aboutTitle"></h2>
        </div>
        <div class="two-column">
          <div class="narrative">
            <p data-field="aboutBody1"></p>
            <p data-field="aboutBody2"></p>
          </div>
          <figure class="media-panel">
            <img src="./assets/program-visual.png" alt="E-MatAX research platform visual" />
          </figure>
        </div>
      </section>

      <section class="content-band center-band" id="center" aria-labelledby="center-title">
        <div class="section-heading compact">
          <p data-field="centerKicker"></p>
          <h2 id="center-title" data-field="centerTitle"></h2>
          <span data-field="centerLead"></span>
        </div>
        <div class="center-layout">
          <article class="director-card"></article>
          <div class="detail-grid"></div>
          <div class="team-grid"></div>
          <div class="related-links"></div>
        </div>
      </section>

      <section class="content-band" id="research" aria-labelledby="research-title">
        <div class="section-heading compact">
          <p data-field="researchKicker"></p>
          <h2 id="research-title" data-field="researchTitle"></h2>
          <span data-field="researchLead"></span>
        </div>
        <div class="research-grid"></div>
      </section>

      <section class="process-band" aria-labelledby="process-title">
        <div class="process-copy">
          <p data-field="processKicker"></p>
          <h2 id="process-title" data-field="processTitle"></h2>
          <p data-field="processLead"></p>
        </div>
        <div class="process-steps"></div>
      </section>

      <section class="content-band" id="fellows" aria-labelledby="fellows-title">
        <div class="section-heading compact">
          <p data-field="fellowsKicker"></p>
          <h2 id="fellows-title" data-field="fellowsTitle"></h2>
          <span data-field="fellowsLead"></span>
        </div>
        <div class="support-grid"></div>
        <div class="fellow-directory-actions">
          <a class="secondary-action dark" href="./fellows.html" data-field="fellowDirectoryCta"></a>
        </div>
      </section>

      <section class="content-band mentors-band" id="mentors" aria-labelledby="mentors-title">
        <div class="section-heading compact">
          <p data-field="mentorsKicker"></p>
          <h2 id="mentors-title" data-field="mentorsTitle"></h2>
          <span data-field="mentorsLead"></span>
        </div>
        <div class="mentor-table-wrap">
          <table class="mentor-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="content-band news-band" id="news" aria-labelledby="news-title">
        <div class="section-heading compact">
          <p data-field="newsKicker"></p>
          <h2 id="news-title" data-field="newsTitle"></h2>
          <span data-field="newsLead"></span>
        </div>
        <div class="news-list"></div>
      </section>

      <section class="apply-band" id="apply" aria-labelledby="apply-title">
        <div>
          <p class="eyebrow" data-field="applyKicker"></p>
          <h2 id="apply-title" data-field="applyTitle"></h2>
          <p data-field="applyLead"></p>
        </div>
        <div class="apply-actions"></div>
      </section>
    </main>

    <footer class="site-footer">
      <img src="./assets/ematax-logo.png" alt="E-MatAX" />
      <p data-field="footerText"></p>
    </footer>

    <script src="./content.js?v=20260707-news-link-fix"></script>
    <script src="./app.js?v=20260707-news-link-fix"></script>
  </body>
</html>
